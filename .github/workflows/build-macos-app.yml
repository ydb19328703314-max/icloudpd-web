name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-macos-app.yml"
      - "desktop/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build desktop app
        run: bash desktop/build_macos_app.sh

      - name: Package app bundle
        run: ditto -c -k --keepParent "dist/iCloudPD Web.app" "dist/iCloudPD Web.app.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: iCloudPD-Web-macOS
          path: |
            dist/iCloudPD Web.app.zip
            dist/icloudpd-helper
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
